{% extends 'base.html' %}
{% block title %}Editar Consulta{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header"><i class="bi bi-pencil-square me-2"></i>Actualizar Consulta</div>
    <div class="card-body">
        <form action="{{ url_for('consulta.edit', id=consulta.id) }}" method="POST">
            <div class="mb-3">
                <label class="form-label">Médico</label>
                <input type="text" class="form-control" value="{{ consulta.medico.nombre }}" disabled>
            </div>
            <div class="mb-3">
                <label class="form-label">Paciente</label>
                <input type="text" class="form-control" value="{{ consulta.paciente.nombre }}" disabled>
            </div>
            <div class="mb-3">
                <label class="form-label">Fecha</label>
                <input type="date" class="form-control" name="fecha" 
                       value="{{ consulta.fecha.strftime('%Y-%m-%d') }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Diagnóstico *</label>
                <textarea class="form-control" name="diagnostico" rows="3" required>{{ consulta.diagnostico }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Tratamiento *</label>
                <textarea class="form-control" name="tratamiento" rows="3" required>{{ consulta.tratamiento }}</textarea>
            </div>
            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <a href="{{ url_for('consulta.index') }}" class="btn btn-secondary me-md-2">Cancelar</a>
                <button type="submit" class="btn btn-warning">Actualizar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
